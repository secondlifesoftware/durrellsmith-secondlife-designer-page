# Render Blueprint — deploys ONLY the portfolio's static React frontend.
#
# There is NO separate backend service here. The live Behance feed is served
# by the EXISTING Second Life Software admin backend
# (https://sls-admin.onrender.com), which now hosts the public
# /api/behance/{username} proxy route. The portfolio reuses that backend, so
# you don't deploy a second service.
#
# After importing this blueprint (or creating the static site manually):
#   1. Add the custom domain  design.secondlifesoftware.com  to this service,
#      then create the DNS record (CNAME) that Render shows you.
#   2. On the existing  sls-admin  backend service, append
#         https://design.secondlifesoftware.com
#      to its CORS_ORIGINS env var (comma-separated) and redeploy — otherwise
#      the browser will block the cross-origin /api/behance/* request.
#
# The Behance feed degrades gracefully: if the backend is unreachable, the UX
# section falls back to its bundled snapshot, so the page is never empty.

services:
  # ---------- React frontend (static only) ----------
  - type: web
    name: durrellsmith-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn install --frozen-lockfile && yarn build
    staticPublishPath: ./build
    # SPA fallback — every unmatched URL serves the React app so deep links
    # (#work, #about, etc.) keep working on refresh.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Live Behance feed is served by the existing SLS admin backend.
      # This is read at BUILD time and baked into the bundle, so changing it
      # requires a rebuild ("Manual Deploy" → "Clear build cache & deploy").
      - key: REACT_APP_BACKEND_URL
        value: https://sls-admin.onrender.com
